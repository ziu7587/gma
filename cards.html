<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모던 카드 레이아웃</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 1. 전체 카드들을 감싸는 컨테이너 (그리드 사용) */
        .card-wrapper {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 가로로 3개 정렬 */
            gap: 30px; /* 카드 사이 간격 */
            max-width: 1200px;
            width: 100%;
        }

        /* 2. 개별 카드 컨테이너 */
        .card {
            background-color: #ffffff;
            border-radius: 15px; /* 모서리 둥글게 */
            overflow: hidden; /* 자식 요소가 모서리를 넘지 않도록 */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08); /* 그림자 적용 */
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        /* 카드 마우스 호버 효과 */
        .card:hover {
            transform: translateY(-10px);
        }

        /* 1. 상단: 이미지 영역 */
        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover; /* 비율 유지하며 채우기 */
        }

        /* 2. 중단: 설명 텍스트 영역 */
        .card-content {
            padding: 20px;
            flex-grow: 1; /* 텍스트 길이에 상관없이 버튼 위치를 맞추기 위함 */
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .card-description {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #666;
        }

        /* 3. 하단: 버튼 영역 */
        .card-footer {
            padding: 20px;
            display: flex;
            justify-content: center; /* 버튼 중앙 정렬 */
        }

        .btn-connect {
            display: inline-block;
            padding: 12px 30px;
            background-color: #4a90e2; /* 기본 배경색 */
            color: #ffffff;
            text-decoration: none; /* 링크 밑줄 제거 */
            font-weight: bold;
            border-radius: 50px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* 버튼 호버 시 색상 변화 */
        .btn-connect:hover {
            background-color: #357abd;
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.4);
        }

        /* 반응형: 모바일 (768px 이하) */
        @media (max-width: 768px) {
            .card-wrapper {
                grid-template-columns: 1fr; /* 세로 정렬 */
            }
        }
    </style>
</head>
<body>

    <!-- 카드들을 감싸는 메인 컨테이너 -->
    <div class="card-wrapper">
        
        <!-- 카드 1: 곱셈공식 학습 앱 연결 -->
        <div class="card">
            <!-- 이미지 영역 -->
            <img src="https://picsum.photos/id/1018/400/300" alt="곱셈공식 학습" class="card-image">
            <!-- 설명 텍스트 영역 -->
            <div class="card-content">
                <h3 class="card-title">곱셈공식 조립 연습</h3>
                <p class="card-description">카드 조립 방식을 통해 고등학교 곱셈공식을 재미있게 익힐 수 있는 인터랙티브 학습 앱입니다.</p>
            </div>
            <!-- 버튼 영역 -->
            <div class="card-footer">
                <a href="activity.html" class="btn-connect">학습하기</a>
            </div>
        </div>

        <!-- 카드 2 -->
        <div class="card">
            <img src="https://picsum.photos/id/1015/400/300" alt="이미지 2" class="card-image">
            <div class="card-content">
                <h3 class="card-title">효율적인 솔루션</h3>
                <p class="card-description">복잡한 비즈니스 로직을 단순화하여 더 빠른 성장을 돕는 스마트한 도구를 소개합니다.</p>
            </div>
            <div class="card-footer">
                <a href="#" class="btn-connect">접속하기</a>
            </div>
        </div>

        <!-- 카드 3 -->
        <div class="card">
            <img src="https://picsum.photos/id/1043/400/300" alt="이미지 3" class="card-image">
            <div class="card-content">
                <h3 class="card-title">강력한 커뮤니티</h3>
                <p class="card-description">전 세계 사람들과 연결되어 아이디어를 공유하고 함께 성장하는 공간입니다.</p>
            </div>
            <div class="card-footer">
                <a href="#" class="btn-connect">접속하기</a>
            </div>
        </div>

    </div>

</body>
</html>

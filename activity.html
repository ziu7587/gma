<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>곱셈공식 조립형 연습</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f39c12;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #e1f5fe;
            border-radius: 10px;
        }

        .question-box {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            border: 3px dashed var(--primary-color);
            border-radius: 15px;
        }

        .question-text {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
        }

        .area-label {
            font-size: 1.1rem;
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 10px;
            display: block;
        }

        /* 답안 조립 영역 */
        .answer-zone {
            min-height: 80px;
            background: #f9f9f9;
            border: 2px solid #ddd;
            border-radius: 15px;
            margin-bottom: 40px;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .answer-zone.drag-over {
            background: #e8f4fd;
            border-color: var(--primary-color);
        }

        /* 선택지 카드 영역 */
        .choices-zone {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 카드 공통 디자인 */
        .card {
            padding: 12px 20px;
            background: var(--card-bg);
            border: 2px solid #d1d8e0;
            border-radius: 8px;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            background: #fcfcfc;
        }

        .card:active {
            transform: translateY(0);
        }

        .card.dragging {
            opacity: 0.5;
        }

        /* 하단 컨트롤 버튼 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-submit:hover {
            background-color: #357abd;
        }

        .btn-next {
            background-color: var(--success-color);
            color: white;
            display: none;
        }

        .btn-next:hover {
            background-color: #27ae60;
        }

        /* 피드백 및 힌트 */
        #feedback {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            min-height: 2em;
        }

        .correct-msg { color: var(--success-color); }
        .wrong-msg { color: var(--danger-color); }
        .hint-msg { color: var(--secondary-color); font-size: 1.2rem; margin-top: 5px; }

        /* 최종 결과 화면 */
        #result-screen {
            display: none;
            text-align: center;
        }

        #result-screen h2 {
            font-size: 3rem;
            color: var(--primary-color);
        }

        #result-screen p {
            font-size: 2rem;
        }

        .btn-restart {
            background-color: var(--primary-color);
            color: white;
        }

        /* 반응형 */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .question-text { font-size: 2rem; }
            .card { font-size: 1.2rem; padding: 8px 15px; }
            button { font-size: 1.2rem; padding: 10px 25px; }
        }
    </style>
</head>
<body>

<div class="container" id="game-screen">
    <h1>🧩 곱셈공식 조립형 연습</h1>

    <div class="status-bar">
        <span id="progress">문제: 1 / 10</span>
        <span id="score-display">점수: 0</span>
    </div>

    <div class="question-box">
        <span class="area-label">문제</span>
        <p class="question-text" id="question-text">(a + b)²</p>
    </div>

    <span class="area-label">답안 조립 영역 (카드를 클릭하거나 드래그하여 완성하세요)</span>
    <div class="answer-zone" id="answer-zone">
        <!-- 사용자가 선택한 카드가 여기에 들어감 -->
    </div>

    <span class="area-label">선택지 카드</span>
    <div class="choices-zone" id="choices-zone">
        <!-- 무작위 카드가 여기에 생성됨 -->
    </div>

    <div id="feedback"></div>

    <div class="controls">
        <button class="btn-submit" onclick="checkAnswer()">답 제출하기</button>
        <button class="btn-next" id="btn-next" onclick="nextQuestion()">다음 문제</button>
    </div>
</div>

<div class="container" id="result-screen">
    <h2>학습 완료!</h2>
    <p id="final-score">최종 점수: 0 / 10</p>
    <button class="btn-restart" onclick="restartGame()">다시 도전하기</button>
</div>

<script>
    /**
     * 문제 은행 데이터 (questionBank)
     * q: 문제식
     * correct: 정답 카드의 정확한 순서 배열
     * choices: 정답 + 오답 카드를 포함한 전체 선택지 배열
     * hint: 틀렸을 때 보여줄 수학적 힌트
     */
    const questionBank = [
        {
            q: "(x + 3)²",
            correct: ["x²", "+", "6x", "+", "9"],
            choices: ["x²", "+", "6x", "+", "9", "3x", "6", "x", "-", "9x", "2x²", "3"],
            hint: "(a+b)² = a² + 2ab + b² 공식을 생각해보세요. 중간항은 2 * x * 3 입니다."
        },
        {
            q: "(a - 4)²",
            correct: ["a²", "-", "8a", "+", "16"],
            choices: ["a²", "-", "8a", "+", "16", "a", "8", "+", "4a", "-", "16a", "2a²", "4"],
            hint: "(a-b)² = a² - 2ab + b² 입니다. 상수항은 (-4)²이므로 항상 양수(+)입니다."
        },
        {
            q: "(x + 5)(x - 5)",
            correct: ["x²", "-", "25"],
            choices: ["x²", "-", "25", "+", "25", "10x", "x", "5x", "-", "5", "10"],
            hint: "(a+b)(a-b) = a² - b² 합차 공식을 이용하세요. 중간항은 사라집니다."
        },
        {
            q: "(x + 2)(x + 4)",
            correct: ["x²", "+", "6x", "+", "8"],
            choices: ["x²", "+", "6x", "+", "8", "2x", "4x", "x", "+", "6", "8x", "10x"],
            hint: "(x+a)(x+b) = x² + (a+b)x + ab 공식을 활용하세요."
        },
        {
            q: "(2x + 3)²",
            correct: ["4x²", "+", "12x", "+", "9"],
            choices: ["4x²", "+", "12x", "+", "9", "2x²", "6x", "4x", "9x", "12", "+", "6"],
            hint: "(2x)²은 4x²이고, 중간항은 2 * 2x * 3 입니다."
        },
        {
            q: "(x - 4)(x + 5)",
            correct: ["x²", "+", "x", "-", "20"],
            choices: ["x²", "+", "x", "-", "20", "-", "x", "+", "20", "9x", "1", "x"],
            hint: "중간항은 (-4 + 5)x, 상수항은 (-4) * 5 입니다. 부호에 주의하세요!"
        },
        {
            q: "(3a - b)²",
            correct: ["9a²", "-", "6ab", "+", "b²"],
            choices: ["9a²", "-", "6ab", "+", "b²", "3a²", "6a", "b", "-", "3ab", "+", "2b²"],
            hint: "(3a)² = 9a² 이고, 중간항은 2 * 3a * (-b) 입니다."
        },
        {
            q: "(2x + 1)(2x - 1)",
            correct: ["4x²", "-", "1"],
            choices: ["4x²", "-", "1", "+", "1", "2x²", "4x", "-", "2", "x²", "2"],
            hint: "합차 공식 (A+B)(A-B) = A² - B²을 적용하면 (2x)² - 1² 이 됩니다."
        },
        {
            q: "(x - 7)(x + 3)",
            correct: ["x²", "-", "4x", "-", "21"],
            choices: ["x²", "-", "4x", "-", "21", "+", "4x", "+", "21", "10x", "x", "7x", "3x"],
            hint: "중간항은 (-7 + 3)x, 상수항은 (-7) * 3 입니다."
        },
        {
            q: "(5x + 2)²",
            correct: ["25x²", "+", "20x", "+", "4"],
            choices: ["25x²", "+", "20x", "+", "4", "10x²", "10x", "5x²", "+", "20", "4x", "25"],
            hint: "(5x)² = 25x², 중간항은 2 * 5x * 2 = 20x 입니다."
        }
    ];

    let currentIndex = 0;
    let score = 0;
    let userAnswer = [];

    const questionTextEl = document.getElementById('question-text');
    const answerZoneEl = document.getElementById('answer-zone');
    const choicesZoneEl = document.getElementById('choices-zone');
    const feedbackEl = document.getElementById('feedback');
    const btnNext = document.getElementById('btn-next');
    const progressEl = document.getElementById('progress');
    const scoreEl = document.getElementById('score-display');

    // 게임 시작
    function initGame() {
        renderQuestion();
    }

    // 문제 렌더링
    function renderQuestion() {
        const currentQ = questionBank[currentIndex];
        questionTextEl.textContent = currentQ.q;
        progressEl.textContent = `문제: ${currentIndex + 1} / ${questionBank.length}`;
        scoreEl.textContent = `점수: ${score}`;
        
        userAnswer = [];
        renderAnswerZone();
        
        // 선택지 셔플
        const shuffledChoices = [...currentQ.choices].sort(() => Math.random() - 0.5);
        choicesZoneEl.innerHTML = '';
        shuffledChoices.forEach(val => {
            const card = createCard(val, true);
            choicesZoneEl.appendChild(card);
        });

        feedbackEl.innerHTML = '';
        btnNext.style.display = 'none';
        document.querySelector('.btn-submit').style.display = 'inline-block';
    }

    // 카드 생성 함수
    function createCard(value, isChoice) {
        const card = document.createElement('div');
        card.className = 'card';
        card.textContent = value;
        card.draggable = true;

        // 클릭 이벤트: 선택지에서 클릭하면 답안지로, 답안지에서 클릭하면 삭제
        card.onclick = () => {
            if (isChoice) {
                addToAnswer(value);
            } else {
                // 답안지에서 인덱스 찾아 삭제 (중복 값 대비 처리)
                const idx = userAnswer.indexOf(value);
                if (idx > -1) {
                    userAnswer.splice(idx, 1);
                    renderAnswerZone();
                }
            }
        };

        // 드래그 시작
        card.ondragstart = (e) => {
            e.dataTransfer.setData('text/plain', value);
            card.classList.add('dragging');
        };

        card.ondragend = () => {
            card.classList.remove('dragging');
        };

        return card;
    }

    // 답안 영역에 카드 추가
    function addToAnswer(value) {
        userAnswer.push(value);
        renderAnswerZone();
    }

    // 답안 영역 다시 그리기
    function renderAnswerZone() {
        answerZoneEl.innerHTML = '';
        userAnswer.forEach((val, index) => {
            const card = createCard(val, false);
            // 답안지 카드는 인덱스 기반으로 삭제하기 위해 onclick 재정의
            card.onclick = () => {
                userAnswer.splice(index, 1);
                renderAnswerZone();
            };
            answerZoneEl.appendChild(card);
        });
    }

    // 드래그 앤 드롭 처리
    answerZoneEl.ondragover = (e) => {
        e.preventDefault();
        answerZoneEl.classList.add('drag-over');
    };

    answerZoneEl.ondragleave = () => {
        answerZoneEl.classList.remove('drag-over');
    };

    answerZoneEl.ondrop = (e) => {
        e.preventDefault();
        answerZoneEl.classList.remove('drag-over');
        const val = e.dataTransfer.getData('text/plain');
        addToAnswer(val);
    };

    // 정답 확인
    function checkAnswer() {
        const currentQ = questionBank[currentIndex];
        const isCorrect = JSON.stringify(userAnswer) === JSON.stringify(currentQ.correct);

        if (isCorrect) {
            feedbackEl.innerHTML = '<span class="correct-msg">정답입니다! 참 잘했어요! 🎉</span>';
            score++;
            scoreEl.textContent = `점수: ${score}`;
            document.querySelector('.btn-submit').style.display = 'none';
            btnNext.style.display = 'inline-block';
        } else {
            feedbackEl.innerHTML = `
                <span class="wrong-msg">아쉬워요! 다시 한번 생각해보세요.</span><br>
                <span class="hint-msg">💡 힌트: ${currentQ.hint}</span>
            `;
        }
    }

    // 다음 문제로
    function nextQuestion() {
        currentIndex++;
        if (currentIndex < questionBank.length) {
            renderQuestion();
        } else {
            showResult();
        }
    }

    // 최종 결과 출력
    function showResult() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').textContent = `최종 점수: ${score} / ${questionBank.length}`;
    }

    // 재시작
    function restartGame() {
        currentIndex = 0;
        score = 0;
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        initGame();
    }

    // 초기화 실행
    initGame();
</script>

</body>
</html>
